<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
button { outline: none !important; -webkit-appearance: none; border: none; cursor: pointer; }
button:focus, button:focus-visible { outline: none !important; box-shadow: none !important; }

:root {
  --primary:       #5446C8;
  --primary-light: #EBE8FF;
  --primary-mid:   #8278E0;
  --x-color:       #5446C8;
  --o-color:       #D93460;
  --o-light:       #FCEDF3;
  --surface:       #EEECF8;
  --surface-2:     #E0DCEF;
  --surface-3:     #CCC7E2;
  --on-surface:    #18143A;
  --on-surface-2:  #5A5580;
  --shadow:        rgba(84,70,200,.16);
  --tie-color:     #1FA89F;
  --tie-light:     #E0F5F4;
  --easing:        cubic-bezier(.34,1.56,.64,1);
  --soft:          cubic-bezier(.25,.8,.25,1);
}
[data-theme="dark"] {
  --primary:       #9B8FFF;
  --primary-light: #1E1B42;
  --primary-mid:   #7068E0;
  --x-color:       #9B8FFF;
  --o-color:       #FF6B8E;
  --o-light:       #3A1020;
  --surface:       #0E0D1C;
  --surface-2:     #1A192E;
  --surface-3:     #262440;
  --on-surface:    #ECEAF8;
  --on-surface-2:  #8884A8;
  --shadow:        rgba(0,0,0,.45);
  --tie-color:     #2FCEC4;
  --tie-light:     #0A2424;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--on-surface);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
  transition: background .35s, color .35s;
  overflow-x: hidden;
}

/* Blobs */
.blobs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.blob { position:absolute; border-radius:50%; filter:blur(90px); opacity:.1; animation:blobFloat 14s ease-in-out infinite; }
.b1{width:500px;height:500px;background:var(--primary);top:-150px;left:-180px;animation-delay:0s;}
.b2{width:380px;height:380px;background:var(--o-color);bottom:-100px;right:-120px;animation-delay:-5s;}
.b3{width:300px;height:300px;background:var(--tie-color);top:45%;left:55%;animation-delay:-9s;}
@keyframes blobFloat {
  0%,100%{transform:translate(0,0) scale(1);}
  40%{transform:translate(25px,-35px) scale(1.06);}
  70%{transform:translate(-18px,22px) scale(.94);}
}

/* Wrapper */
.wrap {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; gap:18px;
  width:100%; max-width:400px;
}

/* Top Bar */
.top-bar { width:100%; display:flex; align-items:center; justify-content:space-between; }
.title { font-size:1.55rem; font-weight:800; letter-spacing:-.03em; color:var(--on-surface); }
.title span { color:var(--primary); }
.icon-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--surface-2);
  font-size:1.1rem; display:flex; align-items:center; justify-content:center;
  transition:background .2s, transform .15s var(--easing);
  color:var(--on-surface);
}
.icon-btn:hover { background:var(--surface-3); transform:scale(1.08); }
.icon-btn:active { transform:scale(.9); }

/* Segmented iOS-style control */
.seg-wrap { width:100%; background:var(--surface-2); border-radius:14px; padding:4px; }
.seg-track { display:flex; position:relative; }
.seg-pill {
  position:absolute; height:100%; border-radius:11px;
  background:var(--primary);
  box-shadow:0 3px 12px var(--shadow);
  transition:left .3s cubic-bezier(.4,0,.2,1), width .3s cubic-bezier(.4,0,.2,1);
  top:0; left:0; pointer-events:none; z-index:0;
}
.seg-btn {
  flex:1; padding:9px 8px; border-radius:11px;
  font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:700;
  background:transparent; color:var(--on-surface-2);
  position:relative; z-index:1;
  transition:color .25s; white-space:nowrap; user-select:none;
}
.seg-btn.active { color:#fff; }

/* Picker */
.picker-wrap {
  width:100%; background:var(--surface-2); border-radius:16px;
  padding:14px 16px;
  flex-direction:column; gap:10px;
  animation:slideDown .35s var(--easing) both;
}
.picker-wrap.visible { display:flex; }
@keyframes slideDown {
  from{opacity:0;transform:translateY(-14px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.picker-label {
  font-size:.72rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.09em; color:var(--on-surface-2);
}
.picker-btns { display:flex; gap:10px; }
.picker-btn {
  flex:1; border:2px solid var(--surface-3);
  border-radius:14px; padding:14px 0;
  background:var(--surface);
  font-family:'DM Sans',sans-serif; font-size:1.5rem; font-weight:800;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  transition:all .22s var(--easing); color:var(--on-surface-2);
}
.picker-btn small { font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
.picker-btn.sel-x { border-color:var(--x-color); background:var(--primary-light); color:var(--x-color); transform:scale(1.04); box-shadow:0 4px 18px var(--shadow); }
.picker-btn.sel-o { border-color:var(--o-color); background:var(--o-light); color:var(--o-color); transform:scale(1.04); box-shadow:0 4px 18px rgba(217,52,96,.18); }
.picker-btn:hover:not(.sel-x):not(.sel-o) { background:var(--surface-3); transform:scale(1.02); }

/* Scoreboard */
.scoreboard { display:flex; gap:10px; width:100%; }
.score-card {
  flex:1; border-radius:16px; padding:13px 10px; text-align:center;
  background:var(--surface-2);
  transition:background .3s, transform .22s var(--easing), box-shadow .22s;
}
.score-card.active { transform:translateY(-3px); box-shadow:0 8px 24px var(--shadow); }
.sc-x.active { background:var(--primary-light); }
.sc-o.active { background:var(--o-light); }
.sc-t.active { background:var(--tie-light); }
.sc-lbl { font-size:.66rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--on-surface-2); }
.sc-lbl.lx{color:var(--x-color);} .sc-lbl.lo{color:var(--o-color);} .sc-lbl.lt{color:var(--tie-color);}
.sc-val { font-size:1.85rem; font-weight:800; letter-spacing:-.03em; line-height:1; margin-top:3px; color:var(--on-surface); }

/* Status */
.status-banner {
  width:100%; background:var(--surface-2); border-radius:14px;
  padding:11px 20px; font-size:.93rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  gap:9px; min-height:46px; transition:background .3s;
}
.turn-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; animation:dotPulse 1.3s ease-in-out infinite; }
@keyframes dotPulse {
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.8);opacity:.5;}
}

/* Board */
.board-wrap { width:100%; aspect-ratio:1; position:relative; animation:boardIn .45s var(--easing) both; }
@keyframes boardIn {
  from{opacity:0;transform:scale(.86) translateY(18px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.board { width:100%; height:100%; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:10px; }
.cell {
  background:var(--surface-2); border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  transition:background .18s, transform .18s var(--easing), box-shadow .18s;
  cursor:pointer;
}
.cell:hover:not(.taken) { background:var(--surface-3); transform:scale(1.05); box-shadow:0 8px 24px var(--shadow); }
.cell:active:not(.taken) { transform:scale(.95); }
.cell.taken { cursor:default; }

/* Ripple */
.ripple {
  position:absolute; border-radius:50%; background:rgba(255,255,255,.28);
  width:140%; height:140%; top:-20%; left:-20%;
  transform:scale(0); animation:rippleAnim .5s linear; pointer-events:none;
}
@keyframes rippleAnim { to{transform:scale(1.6);opacity:0;} }

/* X mark */
.mark { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.x-mark svg line {
  stroke:var(--x-color); stroke-width:7.5; stroke-linecap:round;
  stroke-dasharray:65; stroke-dashoffset:65;
  animation:drawLine .28s var(--easing) forwards;
}
.x-mark svg line:nth-child(2) { animation-delay:.08s; }
@keyframes drawLine{to{stroke-dashoffset:0;}}

/* O mark */
.o-mark svg circle {
  fill:none; stroke:var(--o-color); stroke-width:7; stroke-linecap:round;
  stroke-dasharray:200; stroke-dashoffset:200;
  animation:drawCircle .38s var(--easing) forwards;
}
@keyframes drawCircle{to{stroke-dashoffset:0;}}

/* Hover preview */
.hover-prev { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .18s; pointer-events:none; }
.cell:hover:not(.taken) .hover-prev { opacity:.2; }
/* Disable hover effects during AI's turn */
.board.ai-turn .cell:not(.taken) { cursor:not-allowed; }
.board.ai-turn .cell:hover:not(.taken) { background:var(--surface-2) !important; transform:none !important; box-shadow:none !important; }
.board.ai-turn .cell:hover:not(.taken) .hover-prev { opacity:0 !important; }

/* Win overlay */
.win-overlay { position:absolute; inset:0; pointer-events:none; z-index:10; }
.win-overlay svg { width:100%; height:100%; overflow:visible; }
.win-line {
  stroke-width:7; stroke-linecap:round;
  stroke-dasharray:1200; stroke-dashoffset:1200;
  animation:drawWin .4s var(--easing) forwards; opacity:.85;
}
@keyframes drawWin{to{stroke-dashoffset:0;}}

/* Win cell + sparkle pop */
.cell.win-cell { animation:winPop .6s var(--easing) forwards; }
@keyframes winPop {
  0%  {transform:scale(1);}
  35% {transform:scale(1.15) rotate(3deg);}
  60% {transform:scale(1.07) rotate(-2deg);}
  100%{transform:scale(1.08) rotate(0deg);}
}

/* Floating emoji stars */
.float-star {
  position:fixed; font-size:1.6rem; pointer-events:none; z-index:300;
  animation:floatUp 1.2s ease forwards;
}
@keyframes floatUp {
  0%  {transform:translateY(0) scale(1); opacity:1;}
  80% {transform:translateY(-90px) scale(1.2); opacity:.9;}
  100%{transform:translateY(-130px) scale(.8); opacity:0;}
}

/* Win Banner (floating pill top) */
.win-banner {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:center; z-index:250; pointer-events:none;
  padding-top:22px;
}
.win-pill {
  padding:10px 30px; border-radius:40px;
  font-size:1rem; font-weight:800; color:#fff;
  box-shadow:0 8px 32px var(--shadow);
  animation:pillDrop .5s var(--easing) both, pillBounce 1s var(--easing) .5s infinite alternate;
}
@keyframes pillDrop {
  from{opacity:0;transform:translateY(-50px) scale(.7);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes pillBounce {
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(-6px) scale(1.02);}
}

/* Buttons */
.btn-row { display:flex; gap:10px; width:100%; }
.btn {
  flex:1; padding:13px 18px; border-radius:14px;
  font-family:'DM Sans',sans-serif; font-weight:700; font-size:.92rem;
  position:relative; overflow:hidden;
  transition:transform .18s var(--easing), box-shadow .18s;
}
.btn:active { transform:scale(.95) !important; }
.btn-primary { background:var(--primary); color:#fff; box-shadow:0 4px 16px var(--shadow); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 26px var(--shadow); }
.btn-reset {
  background:var(--surface-3); color:var(--on-surface); font-weight:700;
}
[data-theme="dark"] .btn-reset { background:var(--surface-3); color:var(--on-surface); }
.btn-reset:hover { transform:translateY(-2px); filter:brightness(1.06); }
.btn-ripple {
  position:absolute; border-radius:50%; background:rgba(255,255,255,.22);
  transform:scale(0); animation:btnRipple .55s linear; pointer-events:none;
}
@keyframes btnRipple{to{transform:scale(6);opacity:0;}}

/* Confetti */
#confetti { position:fixed; inset:0; pointer-events:none; z-index:200; }

/* Shake */
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-7px);}
  40%{transform:translateX(7px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
.shake { animation:shake .32s ease both; }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="wrap">

  <div class="top-bar">
    <div class="title">Tic<span>Tac</span>Toe</div>
    <button class="icon-btn" id="themeBtn">🌙</button>
  </div>

  <!-- Segmented mode toggle -->
  <div class="seg-wrap">
    <div class="seg-track" id="segTrack">
      <div class="seg-pill" id="segPill"></div>
      <button class="seg-btn active" data-mode="pvp">👥 2 Players</button>
      <button class="seg-btn" data-mode="ai-easy">🤖 Easy AI</button>
      <button class="seg-btn" data-mode="ai-hard">🧠 Hard AI</button>
    </div>
  </div>

  <!-- X/O Picker — single player only -->
  <div class="picker-wrap" id="pickerWrap" style="display:none">
    <div class="picker-label">You play as</div>
    <div class="picker-btns">
      <button class="picker-btn sel-x" id="pickX" data-pick="X">
        ✕<small>First</small>
      </button>
      <button class="picker-btn" id="pickO" data-pick="O">
        ○<small>Second</small>
      </button>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card sc-x active" id="cardX">
      <div class="sc-lbl lx" id="lblX">Player X</div>
      <div class="sc-val" id="scoreX">0</div>
    </div>
    <div class="score-card sc-t" id="cardT">
      <div class="sc-lbl lt">Ties</div>
      <div class="sc-val" id="scoreT">0</div>
    </div>
    <div class="score-card sc-o" id="cardO">
      <div class="sc-lbl lo" id="lblO">Player O</div>
      <div class="sc-val" id="scoreO">0</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-banner">
    <div class="turn-dot" id="turnDot" style="background:var(--x-color)"></div>
    <span id="statusMsg">Player X's turn</span>
  </div>

  <!-- Board -->
  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board"></div>
    <div class="win-overlay" id="winOverlay"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="newGameBtn">New Game</button>
    <button class="btn btn-reset" id="resetBtn">Reset Scores</button>
  </div>

</div>

<script>
(() => {
  /* ── Persist helpers ── */
  const STORE_KEY = 'ttt_v1';
  function loadStore() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
  }
  function saveStore(data) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify({...loadStore(), ...data})); } catch {}
  }

  /* ── State (hydrate from localStorage) ── */
  const _saved   = loadStore();
  let board      = Array(9).fill(null);
  let current    = 'X';
  let gameOver   = false;
  let mode       = _saved.mode       || 'pvp';
  let playerMark = _saved.playerMark || 'X';
  let scores     = _saved.scores     || {X:0, O:0, T:0};
  let isDark     = _saved.isDark     || false;
  let winBanner  = null;
  let gameGen    = 0;   // incremented on every newGame to cancel stale AI timeouts

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  /* ── DOM ── */
  const $ = id => document.getElementById(id);
  const boardEl   = $('board');
  const winOvl    = $('winOverlay');
  const statusMsg = $('statusMsg');
  const turnDot   = $('turnDot');
  const scoreX    = $('scoreX');
  const scoreO    = $('scoreO');
  const scoreT    = $('scoreT');
  const cardX     = $('cardX');
  const cardO     = $('cardO');
  const cardT     = $('cardT');
  const lblX      = $('lblX');
  const lblO      = $('lblO');
  const themeBtn  = $('themeBtn');
  const newGameBtn= $('newGameBtn');
  const resetBtn  = $('resetBtn');
  const segTrack  = $('segTrack');
  const segPill   = $('segPill');
  const segBtns   = document.querySelectorAll('.seg-btn');
  const pickerWrap= $('pickerWrap');
  const pickX     = $('pickX');
  const pickO     = $('pickO');

  /* ── Segmented pill ── */
  function movePill(btn, instant=false) {
    const tr = segTrack.getBoundingClientRect();
    const br = btn.getBoundingClientRect();
    if (instant) {
      segPill.style.transition = 'none';
      segPill.style.left  = (br.left - tr.left) + 'px';
      segPill.style.width = br.width + 'px';
      requestAnimationFrame(() => {
        segPill.style.transition = '';
      });
    } else {
      segPill.style.left  = (br.left - tr.left) + 'px';
      segPill.style.width = br.width + 'px';
    }
  }
  segBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      segBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      movePill(btn);
      mode = btn.dataset.mode;
      const single = mode !== 'pvp';
      pickerWrap.style.display = single ? 'flex' : 'none';
      if (single) pickerWrap.classList.add('visible');
      saveStore({mode});
      updateLabels();
      newGame();
    });
  });
  window.addEventListener('resize', () => movePill(segTrack.querySelector('.seg-btn.active'), true));

  /* ── Picker ── */
  [pickX, pickO].forEach(btn => {
    btn.addEventListener('click', () => {
      pickX.classList.remove('sel-x');
      pickO.classList.remove('sel-o');
      playerMark = btn.dataset.pick;
      if (playerMark === 'X') pickX.classList.add('sel-x');
      else pickO.classList.add('sel-o');
      saveStore({playerMark});
      newGame();
    });
  });

  /* ── Board ── */
  function buildBoard() {
    boardEl.innerHTML = '';
    winOvl.innerHTML  = '';
    board.forEach((_, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.i = i;
      const prev = document.createElement('div');
      prev.className = 'hover-prev';
      prev.innerHTML = previewSVG();
      cell.appendChild(prev);
      cell.addEventListener('click', onCellClick);
      boardEl.appendChild(cell);
    });
  }

  function previewSVG() {
    return current === 'X' ? xSVG(true) : oSVG(true);
  }

  function xSVG(p) {
    const op = p ? .35 : 1;
    return `<svg viewBox="0 0 60 60" width="52%" height="52%" style="opacity:${op}">
      <line x1="13" y1="13" x2="47" y2="47"/>
      <line x1="47" y1="13" x2="13" y2="47"/>
    </svg>`;
  }
  function oSVG(p) {
    const op = p ? .35 : 1;
    return `<svg viewBox="0 0 60 60" width="52%" height="52%" style="opacity:${op}">
      <circle cx="30" cy="30" r="18"/>
    </svg>`;
  }

  /* ── Click ── */
  function onCellClick() {
    const idx = +this.dataset.i;
    if (gameOver || board[idx]) { if (board[idx]) shake(this); return; }
    if (mode !== 'pvp' && current !== playerMark) return;
    placeMove(idx);
  }

  function placeMove(idx) {
    board[idx] = current;
    renderCell(idx);
    addRipple(cell(idx));
    const win = checkWin();
    if (win) { endGame(win); return; }
    if (board.every(Boolean)) { endGame(null); return; }
    switchTurn();
    refreshPreviews();
    if (mode !== 'pvp' && current !== playerMark && !gameOver) {
      scheduleAI(gameGen);
    }
  }

  function cell(i) { return boardEl.children[i]; }

  function renderCell(i) {
    const c = cell(i);
    c.classList.add('taken');
    c.querySelector('.hover-prev')?.remove();
    const m = document.createElement('div');
    m.className = `mark ${board[i]==='X'?'x-mark':'o-mark'}`;
    m.innerHTML = board[i]==='X' ? xSVG() : oSVG();
    c.appendChild(m);
  }

  /* ── Turn ── */
  function switchTurn() {
    current = current==='X' ? 'O' : 'X';
    updateStatus();
    updateCards();
  }

  function updateStatus(msg) {
    if (msg) { statusMsg.textContent=msg; turnDot.style.display='none'; return; }
    turnDot.style.display='block';
    turnDot.style.background = current==='X' ? 'var(--x-color)' : 'var(--o-color)';
    const aiTurn = mode!=='pvp' && current!==playerMark;
    statusMsg.textContent = aiTurn ? '🤖 AI is thinking…' : `Player ${current}'s turn`;
  }

  function updateCards() {
    cardX.classList.toggle('active', current==='X');
    cardO.classList.toggle('active', current==='O');
    cardT.classList.remove('active');
  }

  function refreshPreviews() {
    document.querySelectorAll('.cell:not(.taken) .hover-prev').forEach(p => {
      p.innerHTML = previewSVG();
    });
  }

  function updateLabels() {
    if (mode==='pvp') { lblX.textContent='Player X'; lblO.textContent='Player O'; return; }
    lblX.textContent = playerMark==='X' ? 'You (X)' : 'AI (X)';
    lblO.textContent = playerMark==='O' ? 'You (O)' : 'AI (O)';
  }

  /* ── Win Check ── */
  function checkWin() {
    for (const c of WINS) {
      const [a,b,cc]=c;
      if (board[a] && board[a]===board[b] && board[a]===board[cc]) return c;
    } return null;
  }

  /* ── End Game ── */
  function endGame(combo) {
    gameOver = true;
    clearBanner();
    if (combo) {
      const w = board[combo[0]];
      scores[w]++;
      animScore(w);
      drawWinLine(combo, w);
      combo.forEach(i => {
        cell(i).classList.add('win-cell');
        spawnStars(cell(i));
      });
      const aiWon = mode!=='pvp' && w!==playerMark;
      const msg = aiWon ? '🤖 AI Wins!' : `🎉 Player ${w} Wins!`;
      updateStatus(msg);
      showBanner(w, msg);
      launchConfetti(w);
    } else {
      scores.T++;
      animScore('T');
      cardT.classList.add('active');
      cardX.classList.remove('active');
      cardO.classList.remove('active');
      updateStatus("🤝 It's a Tie!");
    }
  }

  /* ── Win Banner ── */
  function showBanner(w, msg) {
    const div  = document.createElement('div');
    div.className='win-banner';
    const pill = document.createElement('div');
    pill.className='win-pill';
    pill.style.background = w==='X' ? 'var(--x-color)' : 'var(--o-color)';
    pill.style.boxShadow  = `0 8px 32px ${w==='X'?'rgba(84,70,200,.35)':'rgba(217,52,96,.35)'}`;
    pill.textContent = msg;
    div.appendChild(pill);
    document.body.appendChild(div);
    winBanner = div;
    setTimeout(clearBanner, 3200);
  }
  function clearBanner() { winBanner?.remove(); winBanner=null; }

  /* ── Floating Stars ── */
  function spawnStars(cellEl) {
    const emojis = ['✨','⭐','🌟','💫','🎊'];
    const rect   = cellEl.getBoundingClientRect();
    for (let k=0; k<3; k++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'float-star';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.left = (rect.left + rect.width*.15 + Math.random()*rect.width*.7) + 'px';
        el.style.top  = (rect.top  + rect.height*.3) + 'px';
        el.style.animationDelay = (k*.12)+'s';
        document.body.appendChild(el);
        el.addEventListener('animationend', ()=>el.remove());
      }, k*80);
    }
  }

  /* ── Win Line ── */
  function drawWinLine(combo, w) {
    const wrap  = $('boardWrap');
    const wr    = wrap.getBoundingClientRect();
    const mid   = i => {
      const r = cell(i).getBoundingClientRect();
      return { x: r.left+r.width/2-wr.left, y: r.top+r.height/2-wr.top };
    };
    const f=mid(combo[0]), t=mid(combo[2]);
    const clr = w==='X'?'var(--x-color)':'var(--o-color)';
    winOvl.innerHTML = `<svg><line class="win-line" x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" style="stroke:${clr}"/></svg>`;
  }

  /* ── Score Animation ── */
  function animScore(k) {
    const el = k==='X'?scoreX : k==='O'?scoreO : scoreT;
    el.style.transition='none';
    el.style.transform='scale(1.6)';
    el.textContent = scores[k];
    requestAnimationFrame(()=>{
      el.style.transition='transform .35s var(--easing)';
      el.style.transform='scale(1)';
    });
    saveStore({scores});
  }

  /* ── Ripple ── */
  function addRipple(el) {
    const r=document.createElement('span');
    r.className='ripple';
    el.appendChild(r);
    r.addEventListener('animationend',()=>r.remove());
  }
  function addBtnRipple(btn,e) {
    const rect=btn.getBoundingClientRect();
    const r=document.createElement('span');
    r.className='btn-ripple';
    const s=Math.max(rect.width,rect.height)*2;
    r.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-rect.left-s/2}px;top:${e.clientY-rect.top-s/2}px`;
    btn.appendChild(r);
    r.addEventListener('animationend',()=>r.remove());
  }
  [newGameBtn,resetBtn].forEach(btn=>{
    btn.addEventListener('mousedown',e=>addBtnRipple(btn,e));
    btn.addEventListener('touchstart',e=>{const t=e.touches[0];addBtnRipple(btn,{clientX:t.clientX,clientY:t.clientY});},{passive:true});
  });

  function shake(el) {
    el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
    el.addEventListener('animationend',()=>el.classList.remove('shake'),{once:true});
  }

  /* ── AI ── */
  function scheduleAI(gen) {
    boardEl.classList.add('ai-turn');
    setTimeout(() => {
      if (gen !== gameGen || gameOver) { boardEl.classList.remove('ai-turn'); return; }
      aiMove();
    }, 420);
  }

  function aiMove() {
    boardEl.classList.remove('ai-turn');
    if (gameOver) return;
    const aiMark    = playerMark==='X' ? 'O' : 'X';
    if (current !== aiMark) return;
    const humanMark = playerMark;
    let idx;
    if (mode==='ai-hard') {
      idx = minimax([...board], aiMark, aiMark, humanMark).index;
    } else {
      const empty = board.map((v,i)=>v===null?i:null).filter(x=>x!==null);
      if (!empty.length) return;
      idx = Math.random()<.35
        ? minimax([...board], aiMark, aiMark, humanMark).index
        : empty[Math.floor(Math.random()*empty.length)];
    }
    if (idx != null) placeMove(idx);
  }

  function minimax(b, aiMark, player, humanMark) {
    const empty = b.map((v,i)=>v===null?i:null).filter(x=>x!==null);
    const win   = winnerOf(b);
    if (win===aiMark)    return {score:10};
    if (win===humanMark) return {score:-10};
    if (!empty.length)   return {score:0};
    const moves = [];
    for (const i of empty) {
      const nb=[...b]; nb[i]=player;
      const r=minimax(nb, aiMark, player===aiMark?humanMark:aiMark, humanMark);
      moves.push({index:i, score:r.score});
    }
    return player===aiMark
      ? moves.reduce((a,c)=>c.score>a.score?c:a)
      : moves.reduce((a,c)=>c.score<a.score?c:a);
  }
  function winnerOf(b) {
    for (const [a,bb,c] of WINS) {
      if (b[a] && b[a]===b[bb] && b[a]===b[c]) return b[a];
    } return null;
  }

  /* ── Confetti ── */
  function launchConfetti(w) {
    const canvas=$('confetti'), ctx=canvas.getContext('2d');
    canvas.width=innerWidth; canvas.height=innerHeight;
    const cols = w==='X'
      ? ['#5446C8','#9B8FFF','#C4BDFF','#EBE8FF','#fff']
      : ['#D93460','#FF6B8E','#FFC0CC','#FFE5EC','#fff'];
    const shapes=['circle','rect','star','tri'];
    const pts = Array.from({length:150},()=>({
      x:Math.random()*canvas.width,
      y:-15-Math.random()*100,
      r:Math.random()*5.5+2.5,
      vy:Math.random()*2.5+1.5,
      vx:(Math.random()-.5)*1.2,
      swing:Math.random()*3+1,
      swingT:Math.random()*Math.PI*2,
      swingS:Math.random()*.04+.025,
      spin:Math.random()*Math.PI*2,
      spinS:(Math.random()-.5)*.12,
      color:cols[Math.floor(Math.random()*cols.length)],
      shape:shapes[Math.floor(Math.random()*shapes.length)],
    }));
    let f=0;
    (function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pts.forEach(p=>{
        p.swingT+=p.swingS;
        p.y+=p.vy; p.x+=p.vx+Math.sin(p.swingT)*p.swing*.4;
        p.spin+=p.spinS;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.spin); ctx.fillStyle=p.color;
        if (p.shape==='circle') {
          ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
        } else if (p.shape==='rect') {
          ctx.fillRect(-p.r,-.5*p.r,p.r*2,p.r);
        } else if (p.shape==='star') {
          ctx.beginPath();
          for(let k=0;k<5;k++){const a=k*Math.PI*2/5-Math.PI/2,b2=a+Math.PI/5;ctx.lineTo(Math.cos(a)*p.r,Math.sin(a)*p.r);ctx.lineTo(Math.cos(b2)*p.r*.42,Math.sin(b2)*p.r*.42);}
          ctx.closePath(); ctx.fill();
        } else {
          ctx.beginPath(); ctx.moveTo(0,-p.r); ctx.lineTo(p.r,p.r); ctx.lineTo(-p.r,p.r); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      });
      if (++f < 220) requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    })();
  }

  /* ── New Game ── */
  function newGame() {
    gameGen++;
    board=[...Array(9)].fill(null);
    gameOver=false; current='X';
    boardEl.classList.remove('ai-turn');
    clearBanner();
    updateStatus();
    updateCards();
    updateLabels();
    buildBoard();
    if (mode!=='pvp' && playerMark==='O') scheduleAI(gameGen);
  }

  newGameBtn.addEventListener('click', newGame);
  resetBtn.addEventListener('click', ()=>{
    scores={X:0,O:0,T:0};
    scoreX.textContent='0'; scoreO.textContent='0'; scoreT.textContent='0';
    saveStore({scores});
    newGame();
  });
  themeBtn.addEventListener('click', ()=>{
    isDark=!isDark;
    document.documentElement.setAttribute('data-theme', isDark?'dark':'');
    themeBtn.textContent = isDark ? '☀️' : '🌙';
    saveStore({isDark});
  });

  /* ── Init: restore persisted state ── */
  (function restoreState() {
    // Restore theme
    if (isDark) {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeBtn.textContent = '☀️';
    }

    // Restore mode pill
    const savedModeBtn = [...segBtns].find(b => b.dataset.mode === mode);
    if (savedModeBtn) {
      segBtns.forEach(b => b.classList.remove('active'));
      savedModeBtn.classList.add('active');
    }

    // Restore picker visibility & selection
    if (mode !== 'pvp') {
      pickerWrap.style.display = 'flex';
      pickerWrap.classList.add('visible');
      pickX.classList.remove('sel-x');
      pickO.classList.remove('sel-o');
      if (playerMark === 'X') pickX.classList.add('sel-x');
      else pickO.classList.add('sel-o');
    }

    // Restore scoreboard display
    scoreX.textContent = scores.X;
    scoreO.textContent = scores.O;
    scoreT.textContent = scores.T;
    updateLabels();
  })();

  requestAnimationFrame(() => movePill(segTrack.querySelector('.seg-btn.active'), true));
  buildBoard(); updateStatus(); updateCards();
})();
</script>
</body>
</html>
